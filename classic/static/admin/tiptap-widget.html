<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TipTap Editor Integration</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@tiptap/react@latest/dist/tiptap-react.umd.js"></script>
  <style>
    .tiptap-editor {
      border: 1px solid #ddd;
      border-radius: 4px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .tiptap-toolbar {
      background: #f5f5f5;
      padding: 8px;
      border-bottom: 1px solid #ddd;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tiptap-toolbar button {
      padding: 6px 12px;
      border: 1px solid #ccc;
      background: white;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .tiptap-toolbar button:hover {
      background: #e9ecef;
    }

    .tiptap-toolbar button.is-active {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }

    .tiptap-toolbar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .ProseMirror {
      padding: 16px;
      min-height: 350px;
      outline: none;
    }

    .ProseMirror:focus {
      outline: none;
    }

    .ProseMirror h1 {
      font-size: 2em;
      margin: 0.67em 0;
    }

    .ProseMirror h2 {
      font-size: 1.5em;
      margin: 0.75em 0;
    }

    .ProseMirror h3 {
      font-size: 1.17em;
      margin: 0.83em 0;
    }

    .ProseMirror ul,
    .ProseMirror ol {
      padding-left: 2em;
    }

    .ProseMirror blockquote {
      border-left: 3px solid #ccc;
      padding-left: 1em;
      margin-left: 0;
      color: #666;
    }

    .ProseMirror code {
      background: #f4f4f4;
      padding: 2px 4px;
      border-radius: 3px;
      font-family: monospace;
    }

    .ProseMirror pre {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
    }

    .ProseMirror pre code {
      background: none;
      padding: 0;
    }

    .ProseMirror table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }

    .ProseMirror table td,
    .ProseMirror table th {
      border: 1px solid #ddd;
      padding: 8px;
    }

    .ProseMirror table th {
      background: #f5f5f5;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // This file demonstrates how to integrate TipTap with Decap CMS
    // You would register this as a custom widget in your Decap CMS configuration

    /**
     * Example usage in index.html:
     *
     * CMS.registerEditorComponent({
     *   id: "tiptap",
     *   label: "Rich Text Editor",
     *   fields: [{name: 'content', label: 'Content', widget: 'text'}],
     *   pattern: /^(.*)$/s,
     *   fromBlock: function(match) {
     *     return { content: match[1] };
     *   },
     *   toBlock: function(obj) {
     *     return obj.content;
     *   },
     *   toPreview: function(obj) {
     *     return obj.content;
     *   }
     * });
     */

    console.log('TipTap integration loaded. See comments for usage instructions.');
  </script>
</body>
</html>
