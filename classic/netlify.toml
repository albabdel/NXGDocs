[build]
  command = "npm run sync:storyblok:safe && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  STORYBLOK_REGION = "eu"
  STORYBLOK_SPACE_ID = "289434723537263"
  HYGRAPH_ENDPOINT = "https://api-eu-west-2.hygraph.com/v2/cmcd3s4gx00uq07w3xhw9djjz/master"

  # SECURITY: All sensitive credentials MUST be set in Netlify Dashboard
  # Navigate to: Site Settings → Environment Variables
  #
  # Required Environment Variables (set in Netlify dashboard):
  # - STORYBLOK_ACCESS_TOKEN (public API token - ROTATED 2025-12-28)
  # - STORYBLOK_MANAGEMENT_TOKEN (management API token - ROTATED 2025-12-28)
  # - STORYBLOK_IS_PREVIEW (false for production, true for preview)
  # - SMTP_USER (email service username - ROTATED 2025-12-28)
  # - SMTP_PASS (email service password - ROTATED 2025-12-28)
  #
  # Optional (if using Hygraph):
  # - HYGRAPH_TOKEN (set in dashboard)
  # - HYGRAPH_AS_SOURCE (false - we use Storyblok)
  #
  # ⚠️ NEVER commit API tokens or passwords to version control!

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
