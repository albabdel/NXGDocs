[build]
  command = "npm run sync:storyblok:safe && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  STORYBLOK_ACCESS_TOKEN = "lZ1VpFd6y9FjoNcJQFlXLAtt"
  STORYBLOK_REGION = "eu"
  STORYBLOK_SPACE_ID = "289434723537263"
  # IMPORTANT: Set STORYBLOK_IS_PREVIEW in Netlify dashboard:
  # - Production: STORYBLOK_IS_PREVIEW = "false"
  # - Preview: STORYBLOK_IS_PREVIEW = "true"
  HYGRAPH_ENDPOINT = "https://api-eu-west-2.hygraph.com/v2/cmcd3s4gx00uq07w3xhw9djjz/master"
  # Note: Set HYGRAPH_TOKEN in Netlify dashboard Environment Variables (not here for security)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
